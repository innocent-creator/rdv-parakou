{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDV Parakou — Accès personnel médical</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>

<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 font-bold text-lg">
        <span
          class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-500 to-emerald-500 grid place-items-center text-white">❤️</span>
        <span>RDV <span class="text-sky-600">Parakou</span></span>
      </a>
      <p class="mt-3 text-sm text-white/80">Espace réservé aux spécialistes et administrateurs</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-6">
      <h1 class="font-bold text-lg mb-5">Connexion</h1>
      <div id="authError" class="hidden mb-3 p-3 rounded-lg bg-rose-50 text-rose-700 text-sm"></div>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="text-sm font-medium">Email</label>
          <input name="email" type="email" required
            class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-400 outline-none" />
        </div>
        <div>
          <label class="text-sm font-medium">Mot de passe</label>
          <input name="password" type="password" required
            class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-400 outline-none" />
        </div>
        <button
          class="w-full py-2.5 rounded-lg bg-sky-600 text-white font-semibold hover:bg-sky-700">Se connecter</button>
      </form>
      <a href="/" class="block mt-4 text-center text-sm text-slate-400 hover:text-slate-600">← Retour à l'accueil</a>
    </div>
  </div>

  <script src="{% static 'js/common.js' %}"></script>
  <script>
    (function () {
      const user = getUser();
      if (!user) return;
      if (user.role === 'specialist') window.location.href = '/specialist';
      else if (user.role === 'admin') window.location.href = '/admin-panel';
      else window.location.href = '/patient';
    })();

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const errorEl = document.getElementById('authError');
      errorEl.classList.add('hidden');
      const fd = new FormData(e.target);
      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') })
        });
        setToken(data.token);
        setUser(data.user);
        if (data.user.role === 'specialist') window.location.href = '/specialist';
        else if (data.user.role === 'admin') window.location.href = '/admin-panel';
        else window.location.href = '/patient';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>

</html>
