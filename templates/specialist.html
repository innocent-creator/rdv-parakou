{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDV Parakou — Espace Spécialiste</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <style>
    body {
      background: #f0f4f8;
      background-image: none;
      color: #1e293b;
    }

    /* ── Navbar ───────────────────────────────────────────── */
    .sp-nav {
      background: white;
      box-shadow: 0 1px 10px rgba(0, 0, 0, 0.07);
    }

    .sp-logo-text {
      font-weight: 700;
      font-size: 1.2rem;
      color: #1e3a8a;
      letter-spacing: -0.3px;
    }
    .sp-logo-text span { color: #2563eb; }

    .sp-user-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: #1e293b;
    }
    .sp-user-sub {
      font-size: 0.72rem;
      color: #64748b;
    }

    .sp-nav-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e2e8f0;
    }

    .btn-logout {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 500;
      color: #ef4444;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-logout:hover {
      background: #fee2e2;
      border-color: #fca5a5;
    }

    /* ── Tabs pill ───────────────────────────────────────── */
    .tab-container {
      display: flex;
      background: #e2e8f0;
      border-radius: 9999px;
      padding: 4px;
      gap: 2px;
      width: fit-content;
    }

    .tab-pill {
      padding: 8px 22px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #64748b;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }
    .tab-pill:hover:not(.tab-active) {
      background: rgba(255, 255, 255, 0.6);
      color: #1e293b;
    }
    .tab-active {
      background: #2563eb !important;
      color: white !important;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    }

    /* ── Cards ───────────────────────────────────────────── */
    .sp-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      padding: 24px;
    }

    .sp-section-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 1.25rem;
    }

    /* ── Form inputs ─────────────────────────────────────── */
    .sp-input {
      padding: 9px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #1e293b;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .sp-input:focus { border-color: #2563eb; }
    .sp-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: #64748b;
      display: block;
      margin-bottom: 5px;
    }

    /* ── Add button ──────────────────────────────────────── */
    .btn-add {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      white-space: nowrap;
    }
    .btn-add:hover {
      background: #1d4ed8;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
      transform: translateY(-1px);
    }

    /* ── Slot cards ──────────────────────────────────────── */
    .slot-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .slot-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.1);
    }

    .slot-divider {
      width: 1px;
      height: 36px;
      background: #e2e8f0;
    }

    .slot-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 2px;
    }
    .slot-value {
      font-weight: 600;
      color: #1e293b;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }

    /* ── Status pills ────────────────────────────────────── */
    .pill-available { background: #d1fae5; color: #065f46; }
    .pill-booked    { background: #dbeafe; color: #1e40af; }
    .pill-deleted   { background: #fee2e2; color: #991b1b; }
    .pill-pending   { background: #fef3c7; color: #92400e; }
    .pill-confirmed { background: #d1fae5; color: #065f46; }
    .pill-rejected  { background: #fee2e2; color: #991b1b; }
    .pill-cancelled { background: #e2e8f0; color: #475569; }

    .status-badge {
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── Delete button ───────────────────────────────────── */
    .btn-delete {
      font-size: 0.78rem;
      color: #ef4444;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      padding: 5px 12px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn-delete:hover {
      background: #fee2e2;
      border-color: #fca5a5;
    }

    /* ── Appointment cards ───────────────────────────────── */
    .apt-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      padding: 20px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .apt-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.1);
    }

    /* ── Profile form ────────────────────────────────────── */
    .sp-textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.875rem;
      outline: none;
      resize: none;
      color: #1e293b;
      background: #f8fafc;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .sp-textarea:focus { border-color: #2563eb; }

    .btn-save {
      width: 100%;
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
    }
    .btn-save:hover {
      background: #1d4ed8;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
      transform: translateY(-1px);
    }
    .btn-save:disabled {
      background: #93c5fd;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- ═══════════════════ NAVBAR ═══════════════════ -->
  <nav class="sp-nav sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">

      <a href="/" class="flex items-center gap-2 no-underline">
        <img src="{% static 'images/logo.png' %}" alt="RDV Parakou"
             class="w-10 h-10 rounded-lg object-contain">
        <span class="sp-logo-text">RDV <span>Parakou</span></span>
      </a>

      <div class="flex items-center gap-3">
        <div id="navAvatarWrap"></div>
        <div class="hidden sm:block text-right">
          <div class="sp-user-name" id="userName"></div>
          <div class="sp-user-sub" id="profileInfo"></div>
        </div>
        <button onclick="logout()" class="btn-logout">Déconnexion</button>
      </div>

    </div>
  </nav>

  <!-- ═══════════════════ CONTENU ═══════════════════ -->
  <div class="max-w-4xl mx-auto px-6 py-10">

    <!-- ONGLETS -->
    <div class="tab-container mb-8">
      <button id="tab_slots"        class="tab-pill tab-active" onclick="showTab('slots')">Mes créneaux</button>
      <button id="tab_appointments" class="tab-pill"            onclick="showTab('appointments')">Rendez-vous</button>
      <button id="tab_profile"      class="tab-pill"            onclick="showTab('profile')">Mon profil</button>
    </div>

    <!-- ── Section Créneaux ─────────────────────────── -->
    <div id="section_slots" class="space-y-5">

      <div class="sp-card">
        <h2 class="sp-section-title">Ajouter un créneau</h2>
        <form id="addSlotForm">
          <div class="flex flex-wrap gap-4 items-end">
            <div>
              <label class="sp-label">Date</label>
              <input type="date" name="slot_date" required class="sp-input" style="width:auto;" />
            </div>
            <div>
              <label class="sp-label">Début</label>
              <input type="time" name="start_time" required class="sp-input" style="width:auto;font-family:monospace;" />
            </div>
            <div>
              <label class="sp-label">Fin</label>
              <input type="time" name="end_time" required class="sp-input" style="width:auto;font-family:monospace;" />
            </div>
            <button type="submit" class="btn-add">＋ Ajouter</button>
          </div>
        </form>
      </div>

      <div id="slotsList" class="space-y-3"></div>
    </div>

    <!-- ── Section Rendez-vous ──────────────────────── -->
    <div id="section_appointments" class="hidden space-y-4">
      <h2 class="sp-section-title">Rendez-vous patients</h2>
      <div id="appointmentsList" class="space-y-3"></div>
    </div>

    <!-- ── Section Mon profil ───────────────────────── -->
    <div id="section_profile" class="hidden">
      <div class="sp-card space-y-6">
        <h2 class="sp-section-title" style="margin-bottom:0;">Mon profil</h2>

        <div id="profileSuccess" class="hidden flex items-center gap-2 px-4 py-3 rounded-xl"
          style="background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;font-size:0.875rem;font-weight:500;">
          <span>✓</span><span>Profil mis à jour avec succès !</span>
        </div>

        <div id="profileLoading" style="color:#94a3b8;font-size:0.875rem;">Chargement du profil…</div>

        <div id="profileContent" class="hidden space-y-6">

          <!-- Photo + identité -->
          <div class="flex items-center gap-5">
            <div id="profileAvatarWrap"></div>
            <div>
              <div style="font-weight:700;font-size:1.05rem;color:#1e293b;" id="profileFullName"></div>
              <div style="color:#2563eb;font-weight:500;font-size:0.875rem;" id="profileSpecialty"></div>
              <div style="font-size:0.78rem;color:#64748b;" id="profileClinic"></div>
            </div>
          </div>

          <!-- Formulaire -->
          <form id="profileForm" class="space-y-5">

            <div>
              <label class="sp-label">Photo de profil</label>
              <div class="flex items-center gap-4">
                <div id="profilePhotoThumb"
                  style="width:60px;height:60px;border-radius:50%;overflow:hidden;background:#f1f5f9;flex-shrink:0;"></div>
                <div>
                  <label for="profilePhotoInput"
                    style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:#f1f5f9;font-size:0.8rem;font-weight:500;color:#475569;cursor:pointer;"
                    onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#f1f5f9'">
                    📷 Changer la photo
                  </label>
                  <input type="file" name="photo" id="profilePhotoInput" accept=".jpg,.jpeg,.png" class="hidden" />
                  <p id="profilePhotoError" class="hidden mt-1" style="font-size:0.72rem;color:#e11d48;"></p>
                  <p style="margin-top:4px;font-size:0.72rem;color:#94a3b8;">JPG ou PNG · max 2 Mo</p>
                </div>
              </div>
            </div>

            <div>
              <label for="profileBio" class="sp-label">Ma biographie</label>
              <textarea id="profileBio" name="bio" rows="6" class="sp-textarea"
                placeholder="Décrivez votre parcours, vos spécialités, votre expérience…"></textarea>
            </div>

            <button type="submit" id="profileSaveBtn" class="btn-save">
              Enregistrer les modifications
            </button>
          </form>
        </div>
      </div>
    </div>

  </div>

  <script src="{% static 'js/common.js' %}?v=4"></script>
  <script src="{% static 'js/specialist.js' %}?v=5"></script>
</body>
</html>
